<!DOCTYPE html>

<html>

<head>

    <title>
        NeuroVolt AI Dashboard
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    />

</head>

<body>

    <div class="container">

        <h1>
            NeuroVolt AI Dashboard
        </h1>

        <div class="grid">

            <div class="card">
                <h2>Battery Temperature</h2>

                <p id="batteryTemp">
                    Loading...
                </p>
            </div>

            <div class="card">
                <h2>Motor Temperature</h2>

                <p id="motorTemp">
                    Loading...
                </p>
            </div>

            <div class="card">
                <h2>Motor RPM</h2>

                <p id="motorRPM">
                    Loading...
                </p>
            </div>

            <div class="card">
                <h2>Vehicle Status</h2>

                <p id="vehicleStatus">
                    Loading...
                </p>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
